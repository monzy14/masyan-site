<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <title>Портфолио — MASYAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: rgba(18,18,18,.9);
      --border: rgba(197,160,89,.2);
      --accent: #C5A059;
      --accent-hover: #D4AF37;
      --text: #f0eee6;
      --text-muted: rgba(240,238,230,.5);
      --radius-card: 16px;
      --radius-btn: 50px;
      --font: 'Inter', sans-serif;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --header-h: 76px;
      --header-h-scroll: 60px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); color: var(--text); line-height: 1.6; overflow-x: hidden; background: #0a0a0a; }
    #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    a { text-decoration: none; color: inherit; }
    #scrollTop {
      position: fixed; bottom: 30px; right: 30px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent); color: #0a0a0a;
      border: none; font-size: 18px;
      cursor: pointer;
      opacity: 0; visibility: hidden;
      transform: translateY(20px);
      transition: all .3s var(--spring);
      z-index: 50;
      box-shadow: 0 4px 16px rgba(197,160,89,.3);
    }
    #scrollTop.show { opacity: 1; visibility: visible; transform: translateY(0); }
    #scrollTop:hover { background: var(--accent-hover); transform: translateY(-3px); }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #111;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none;
      color: var(--text-muted); font-size: 24px;
      cursor: pointer; transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-box h3 { font-size: 20px; margin-bottom: 6px; }
    .modal-box h3 span { color: var(--accent); }
    .modal-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .modal-field {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    .modal-field:focus { border-color: var(--accent); }
    .modal-submit {
      width: 100%; padding: 14px;
      background: var(--accent); color: #0a0a0a;
      border: none; border-radius: var(--radius-btn);
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer;
      transition: background .25s;
    }
    .modal-submit:hover { background: var(--accent-hover); }
    .modal-toast {
      text-align: center; padding: 20px; color: #22c55e; font-weight: 600; display: none;
    }
    img { max-width: 100%; display: block; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity .6s ease, transform .6s var(--spring); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    header { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; height: var(--header-h); background: transparent; transition: background .35s, box-shadow .35s, height .35s; }
    header.scrolled { background: rgba(10,10,10,.92); backdrop-filter: blur(12px); box-shadow: 0 1px 0 var(--border); height: var(--header-h-scroll); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; }
    .logo { font-size: clamp(20px, 2.5vw, 26px); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }
    .logo span { color: var(--text); font-weight: 300; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: color .25s; color: var(--text-muted); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-cta { background: transparent; border: 1px solid var(--accent); color: var(--accent) !important; padding: 8px 24px; border-radius: var(--radius-btn); font-weight: 600; font-size: 11px; letter-spacing: 2px; transition: all .25s; }
    .nav-cta:hover { background: var(--accent); color: #0a0a0a !important; }
    .fav-counter { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: default; }
    .fav-counter i { color: var(--accent); }
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .burger span { display: block; width: 26px; height: 2px; background: var(--text); border-radius: 2px; transition: .3s; }
    .burger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .burger.active span:nth-child(2) { opacity: 0; }
    .burger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    .page-top { padding: 130px 0 40px; text-align: center; }
    .page-top h1 { font-size: clamp(30px, 5vw, 48px); font-weight: 700; letter-spacing: -1px; }
    .page-top h1 span { color: var(--accent); }
    .page-top p { color: var(--text-muted); max-width: 500px; margin: 12px auto 0; font-size: 14px; }

    .section { padding: 40px 0 80px; }

    .portfolio-controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; align-items: center; justify-content: center; }
    .portfolio-controls input { flex: 1 1 200px; padding: 12px 18px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-btn); color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
    .portfolio-controls input:focus { border-color: var(--accent); }
    .filter-btn { padding: 8px 24px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-btn); color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all .25s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 600; }

    .gallery { column-count: 1; column-gap: 16px; }
    .gallery-item { break-inside: avoid; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; margin-bottom: 16px; transition: opacity .35s, transform .3s var(--spring); cursor: pointer; position: relative; }
    .gallery-item.hidden { opacity: 0; height: 0; margin: 0; overflow: hidden; pointer-events: none; }
    .gallery-item:hover { transform: translateY(-4px); border-color: var(--accent); }
    .gallery-item img { width: 100%; display: block; }
    .gallery-item-body { padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
    .gallery-item-body h4 { font-size: 14px; font-weight: 600; }
    .fav-btn { background: none; border: none; font-size: 18px; cursor: pointer; transition: transform .25s var(--spring); color: var(--text-muted); }
    .fav-btn.liked { color: #ef4444; transform: scale(1.15); }
    .fav-btn:hover { transform: scale(1.2); }

    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 85vh; border-radius: var(--radius-card); box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    .lightbox-close { position: absolute; top: 24px; right: 28px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; opacity: .7; transition: opacity .2s; }
    .lightbox-close:hover { opacity: 1; }

    footer { border-top: 1px solid var(--border); padding: 50px 0; }
    .footer-grid { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; justify-content: space-between; }
    .footer-logo { font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
    .footer-logo span { color: var(--text); font-weight: 300; }
    .footer-socials { display: flex; gap: 16px; }
    .footer-socials a { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-muted); transition: all .25s; }
    .footer-socials a:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .footer-email { font-size: 13px; color: var(--text-muted); transition: color .25s; }
    .footer-email:hover { color: var(--accent); }

    @media (min-width: 768px) { .gallery { column-count: 2; } }
    @media (min-width: 1024px) { .gallery { column-count: 3; } }
    @media (max-width: 767px) {
      .burger { display: flex; }
      .nav-links { position: fixed; top: 0; right: -100%; width: 270px; height: 100vh; background: #111; flex-direction: column; padding: 90px 28px 30px; gap: 20px; align-items: flex-start; transition: right .35s ease; border-left: 1px solid var(--border); }
      .nav-links.open { right: 0; }
      .nav-cta { margin-top: 6px; }
      .fav-counter { margin-left: auto; margin-right: 16px; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">MAS<span>YAN</span></a>
      <div class="fav-counter" id="favCounter" aria-label="Избранное">
        <i class="fas fa-heart"></i>
        <span id="favCount">0</span>
      </div>
      <button class="burger" id="burgerBtn" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="navMenu" aria-label="Основная навигация">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="portfolio.html" class="active">Портфолио</a>
        <a href="#" class="nav-cta" id="contactBtn">Связаться</a>
      </nav>
    </div>
  </header>

  <div class="page-top">
    <div class="container">
      <h1 class="reveal">Наше <span>портфолио</span></h1>
      <p class="reveal">Проекты в веб-дизайне и брендинге</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="portfolio-controls reveal">
        <input type="text" id="searchInput" placeholder="Поиск проектов…" aria-label="Поиск по проектам">
        <button class="filter-btn active" data-filter="all" aria-label="Показать все">Все</button>
        <button class="filter-btn" data-filter="Веб-дизайн" aria-label="Фильтр: Веб-дизайн">Веб-дизайн</button>
        <button class="filter-btn" data-filter="Брендинг" aria-label="Фильтр: Брендинг">Брендинг</button>
      </div>
      <div class="gallery" id="gallery"></div>
    </div>
  </section>

  <div class="lightbox" id="lightbox" role="dialog" aria-label="Просмотр проекта">
    <button class="lightbox-close" id="lightboxClose" aria-label="Закрыть">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <button id="scrollTop" aria-label="Наверх"><i class="fas fa-arrow-up"></i></button>

  <div class="modal-overlay" id="contactModal">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>
      <h3>Свяжитесь <span>с нами</span></h3>
      <p>Оставьте заявку — мы ответим в течение часа</p>
      <form id="modalForm">
        <input class="modal-field" type="text" placeholder="Ваше имя" required>
        <input class="modal-field" type="email" placeholder="Email или телефон" required>
        <textarea class="modal-field" placeholder="Опишите задачу…" rows="3"></textarea>
        <button class="modal-submit" type="submit">Отправить</button>
      </form>
      <div class="modal-toast" id="modalToast">✓ Спасибо! Мы свяжемся с вами</div>
    </div>
  </div>

  <footer id="contact">
    <div class="container footer-grid">
      <div class="footer-logo">MAS<span>YAN</span></div>
      <a href="mailto:lildozhd@gmail.com" class="footer-email">lildozhd@gmail.com</a>
      <div class="footer-socials">
        <a href="https://vk.com/bshon" aria-label="VK"><i class="fab fa-vk"></i></a>
        <a href="#" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
      <div class="footer-copy">&copy; 2026 MASYAN. Все права защищены.</div>
    </div>
  </footer>

  <script>
    const PROJECTS_DATA = [
      { id: 'p1', title: 'Сайт для ресторана', category: 'Веб-дизайн', img: 'https://placehold.co/600x400/C5A059/0a0a0a?text=Restaurant' },
      { id: 'p2', title: 'Айдентика LOOM', category: 'Брендинг', img: 'https://placehold.co/600x360/1a1a1a/C5A059?text=LOOM' },
      { id: 'p3', title: 'Интернет-магазин MODE', category: 'Веб-дизайн', img: 'https://placehold.co/600x480/C5A059/0a0a0a?text=MODE' },
      { id: 'p4', title: 'Логотип для студии', category: 'Брендинг', img: 'https://placehold.co/600x320/1a1a1a/C5A059?text=Brand' },
      { id: 'p5', title: 'Лендинг для стартапа', category: 'Веб-дизайн', img: 'https://placehold.co/600x440/C5A059/0a0a0a?text=Startup' },
      { id: 'p6', title: 'Упаковка премиум', category: 'Брендинг', img: 'https://placehold.co/600x380/1a1a1a/C5A059?text=Premium' },
    ];

    let favorites = [];

    function loadFavorites() {
      try { const saved = localStorage.getItem('masyan_favorites'); favorites = saved ? JSON.parse(saved) : []; } catch { favorites = []; }
    }
    function saveFavorites() { try { localStorage.setItem('masyan_favorites', JSON.stringify(favorites)); } catch {} }
    function updateFavCounter() { document.getElementById('favCount').textContent = favorites.length; }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
      const activeFilter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
      const filtered = PROJECTS_DATA.filter(p => {
        return p.title.toLowerCase().includes(searchVal) && (activeFilter === 'all' || p.category === activeFilter);
      });
      gallery.innerHTML = filtered.map(p => {
        const liked = favorites.includes(p.id);
        return `<div class="gallery-item" data-id="${p.id}">
          <img src="${p.img}" alt="${p.title}" loading="lazy">
          <div class="gallery-item-body">
            <h4>${p.title}</h4>
            <button class="fav-btn ${liked ? 'liked' : ''}" data-id="${p.id}" aria-label="${liked ? 'Убрать из избранного' : 'Добавить в избранное'}">${liked ? '❤️' : '🤍'}</button>
          </div>
        </div>`;
      }).join('');
      gallery.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('.fav-btn')) return;
          const project = PROJECTS_DATA.find(p => p.id === el.dataset.id);
          if (project) openLightbox(project.img);
        });
      });
      gallery.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const idx = favorites.indexOf(id);
          if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
          saveFavorites();
          updateFavCounter();
          renderGallery();
        });
      });
    }

    function openLightbox(src) { const lb = document.getElementById('lightbox'); document.getElementById('lightboxImg').src = src; lb.classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

    document.addEventListener('DOMContentLoaded', () => {
      loadFavorites();
      renderGallery();
      updateFavCounter();
      document.getElementById('searchInput').addEventListener('input', renderGallery);
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGallery();
        });
      });
      document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
      document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

      const burger = document.getElementById('burgerBtn');
      const nav = document.getElementById('navMenu');
      burger.addEventListener('click', () => { burger.classList.toggle('active'); nav.classList.toggle('open'); });
      nav.querySelectorAll('a').forEach(l => l.addEventListener('click', () => { burger.classList.remove('active'); nav.classList.remove('open'); }));

      const header = document.getElementById('header');
      window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 40); }, { passive: true });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize);
      resize();
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2.5 + 0.5;
          this.speedY = -(Math.random() * 0.3 + 0.1);
          this.speedX = (Math.random() - 0.5) * 0.15;
          this.opacity = Math.random() * 0.5 + 0.15;
          this.pulse = Math.random() * Math.PI * 2;
          this.pulseSpeed = Math.random() * 0.02 + 0.005;
        }
        update() {
          this.y += this.speedY; this.x += this.speedX; this.pulse += this.pulseSpeed;
          if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) this.reset();
          if (this.y < 0) this.y = canvas.height;
        }
        draw() {
          const alpha = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(197, 160, 89, ${alpha})`;
          ctx.fill();
        }
      }
      const count = Math.min(120, Math.floor(canvas.width * canvas.height / 8000));
      for (let i = 0; i < count; i++) particles.push(new Particle());
      function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
      animate();

      const scrollBtn = document.getElementById('scrollTop');
      window.addEventListener('scroll', () => { scrollBtn.classList.toggle('show', window.scrollY > 300); }, { passive: true });
      scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

      const modalOverlay = document.getElementById('contactModal');
      const modalClose = document.getElementById('modalClose');
      const contactBtn = document.getElementById('contactBtn');
      const modalForm = document.getElementById('modalForm');
      const modalToast = document.getElementById('modalToast');

      contactBtn.addEventListener('click', e => { e.preventDefault(); modalOverlay.classList.add('open'); });
      modalClose.addEventListener('click', () => { modalOverlay.classList.remove('open'); modalToast.style.display = 'none'; modalForm.style.display = 'block'; });
      modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) { modalOverlay.classList.remove('open'); modalToast.style.display = 'none'; modalForm.style.display = 'block'; } });
      modalForm.addEventListener('submit', e => {
        e.preventDefault();
        modalForm.style.display = 'none';
        modalToast.style.display = 'block';
        setTimeout(() => { modalOverlay.classList.remove('open'); modalToast.style.display = 'none'; modalForm.style.display = 'block'; modalForm.reset(); }, 2000);
      });
    });
  </script>
</body>
</html>
